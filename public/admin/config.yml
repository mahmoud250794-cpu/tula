backend:
  name: git-gateway
  branch: main

site_url: https://YOUR-SITE-NAME.netlify.app
display_url: https://YOUR-SITE-NAME.netlify.app

media_folder: "public/images"
public_folder: "/images"

collections:
  - name: "settings"
    label: "⚙️ إعدادات الموقع"
    files:
      - name: "general"
        label: "الإعدادات العامة"
        file: "src/data/config.json"
        fields:
          - { label: "اسم الموقع", name: "siteName", widget: "string" }
          - label: "اللوجو"
            name: "logo"
            widget: "image"
            required: false
          - label: "روابط التواصل الاجتماعي"
            name: "socialLinks"
            widget: "object"
            fields:
              - { label: "Facebook", name: "facebook", widget: "string", required: false }
              - { label: "Instagram", name: "instagram", widget: "string", required: false }
              - { label: "WhatsApp", name: "whatsapp", widget: "string", required: false }

  - name: "products"
    label: "🛍️ المنتجات"
    files:
      - name: "all_products"
        label: "قائمة المنتجات"
        file: "src/data/products.json"
        fields:
          - label: "المنتجات"
            name: "products"
            widget: "list"
            fields:
              - { label: "اسم المنتج", name: "name", widget: "string" }
              - { label: "الوصف", name: "description", widget: "text" }
              - { label: "السعر (ريال)", name: "price", widget: "number" }
              - label: "صورة المنتج"
                name: "image"
                widget: "image"
                required: false
              - label: "فيديو المنتج"
                name: "video"
                widget: "file"
                required: false
