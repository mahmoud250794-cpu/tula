<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tula Store</title>
  <script>
    // 🔐 معالجة روابط التفعيل من الإيميل (مهم جداً)
    window.addEventListener('DOMContentLoaded', function() {
      const hash = window.location.hash;
      // إذا كان الرابط يحتوي على توكن تفعيل، أعد التوجيه للوحة التحكم
      if (hash && (hash.includes('invite_token') || hash.includes('confirmation_token') || hash.includes('recovery_token'))) {
        window.location.href = '/admin' + hash;
      }
    });
  </script>
</head>
<body>
  <div id="root">جاري التحميل...</div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
